# Theme metadata
name = "Ocean"

[light]
  # Primary
  primary = "#3f51b5"

  # Menu
  menu_primary = "#3f51b5" # Material 500
  menu_text = "#fff"
  menu_text_active = "#3b86ff" # Material Complemantary 500
  menu_title = "#fff"

  # Home sections
  home_section_odd = "rgb(255, 255, 255)"
  home_section_even = "rgb(247, 247, 247)"

[dark]
  # Primary
  primary = "#3b86ff"  # same accent blue as light

  # Menu
  menu_primary = "#3b86ff" # Material 500
  menu_text = "#fff"
  menu_text_active = "#3f51b5" # Material Complemantary 500
  menu_title = "#fff"

  # Home sections
  home_section_odd = "#1f1f1f"   # slightly lighter than pure black
  home_section_even = "#262626" # alternating for section contrast